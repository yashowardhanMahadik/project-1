server:
  port: 8080

spring:
  application:
    name: springboot-auth-starter

  datasource:
    url: jdbc:postgresql://localhost:5433/authdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: CHANGE_ME_USE_A_256_BIT_BASE64_ENCODED_SECRET_KEY_IN_PRODUCTION
    expiration-ms: 86400000   # 24 hours in milliseconds

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
